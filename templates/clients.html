<!DOCTYPE html>

<html>

<head>

<title>Clients</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">Client Management</h2>

<form action="/add_client" method="POST">

<input type="text" name="name" class="form-control mb-2" placeholder="Client Name" required>

<input type="text" name="phone" class="form-control mb-2" placeholder="Phone Number" required>

<input type="email" name="email" class="form-control mb-2" placeholder="Email" required>

<input type="text" name="city" class="form-control mb-3" placeholder="City" required>

<button class="btn btn-success">
Add Client
</button>

</form>

<hr>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

<th>City</th>

<th>Action</th>

</tr>

</thead>

<tbody>

{% for client in clients %}

<tr>

<td>{{client.id}}</td>

<td>{{client.name}}</td>

<td>{{client.email}}</td>

<td>{{client.phone}}</td>

<td>{{client.city}}</td>

<td>

<a href="/delete_client/{{client.id}}" class="btn btn-danger btn-sm">

Delete

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

<a href="/dashboard" class="btn btn-primary">

Dashboard

</a>

</div>

</body>

</html>
