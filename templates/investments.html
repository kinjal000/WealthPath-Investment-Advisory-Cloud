<!DOCTYPE html>

<html>

<head>

<title>Investments</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">Investment Management</h2>

<form action="/add_investment" method="POST">

<input type="text" name="client" class="form-control mb-2" placeholder="Client Name" required>

<input type="text" name="investment" class="form-control mb-2" placeholder="Investment Type" required>

<input type="number" name="amount" class="form-control mb-2" placeholder="Amount" required>

<select name="risk" class="form-control mb-3">

<option>Low</option>

<option>Medium</option>

<option>High</option>

</select>

<button class="btn btn-success">

Add Investment

</button>

</form>

<hr>

<table class="table table-striped table-bordered">

<thead class="table-success">

<tr>

<th>ID</th>

<th>Client</th>

<th>Investment Type</th>

<th>Amount</th>

<th>Risk</th>

<th>Action</th>

</tr>

</thead>

<tbody>

{% for i in investments %}

<tr>

<td>{{i.id}}</td>

<td>{{i.client_name}}</td>

<td>{{i.investment_type}}</td>

<td>{{i.amount}}</td>

<td>{{i.risk_level}}</td>

<td>

<a href="/delete_investment/{{i.id}}" class="btn btn-danger btn-sm">

Delete

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

<a href="/dashboard" class="btn btn-primary">

Dashboard

</a>

</div>

</body>

</html>
